<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00f0ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep-space tile -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14"
        fill="#05070f" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Reactor bloom -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-opacity="0.9"/>

  <!-- Segmented mid ring -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#00f0ff" stroke-width="2"
          stroke-opacity="0.6" stroke-dasharray="3 4"/>

  <!-- Arc-reactor triangle core -->
  <path d="M32 20 L43 39 L21 39 Z" fill="none" stroke="#7df4ff" stroke-width="2.5"
        stroke-linejoin="round"/>

  <!-- Core node -->
  <circle cx="32" cy="33.5" r="3.4" fill="#dbfcff"/>
</svg>
